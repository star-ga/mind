# mind-bench reference hashes — RFC 0020 §5. See dot-l2-q16/reference_hashes.toml
# for full provenance/signing notes.
#
# STRICT-FP f32 vector dot (dot_f32_v), a NEW bit-identity class. The strict-FP
# tier unfuses the FMA and pins the horizontal reduction to a fixed left-to-right
# lane fold, so the result is bit-EXACT (not a 1e-4 tolerance). The canonical
# output is the f32 result's IEEE-754 bit pattern as an i64, serialised
# little-endian, then sha256.
#
# Unlike the integer tiers, cross-substrate identity here rests on strict-FP
# lowering, so the avx2 == neon claim MUST be blessed on REAL aarch64 — it is
# NOT asserted from x86 + the associativity argument.
#
#   avx2 — blessed on x86_64 (MIND_BENCH_REQUIRE=1, LLVM 20): the kernel
#          emits strict scalar vmulss/vaddss with no vfmadd and no reassociating
#          reduction, cross-checked bit-for-bit against the fixed-order fold
#          oracle within the run. Continuously enforced on x86 (CI job
#          `cross_substrate_identity`, ubuntu-24.04).
#   neon — BLESSED on REAL aarch64 (2026-07-14). Harvested from the
#          `cross_substrate_identity (neon)` CI job on the GitHub-hosted
#          `ubuntu-24.04-arm` runner (host: aarch64-unknown-linux-gnu, LLVM 20,
#          MIND_BENCH_REQUIRE=1) — real ARM silicon, NOT emulation, NOT derived
#          from x86. The kernel's own strict-FP fold ran on ARM, cross-checked
#          bit-for-bit against the fixed-order fold oracle within the run, and
#          produced the IDENTICAL sha256 as avx2. Reproduced across FOUR
#          independent ARM runs / four commits before blessing:
#            job 86996917253 (e342698), 86990556888 (4086fd7),
#            86984729367 (c8b3526), 86980091885 (1382c5c)
#          all → a132f7b9…, result bits 0x41f9713f.
#          This closes the strict-FP ARM leg of the wedge: bit-identity here
#          rests on the strict lowering (FMA unfused, pinned fixed-order fold),
#          not on integer associativity, so it could only ever be proven by
#          execution on real ARM — and now has been. A future divergence on
#          either line is a WEDGE BREAK, not a re-bless.

avx2 = "a132f7b970b647cd158f591d764c19ec41a8cf27c398c87758f74efb5a8a22c0"
neon = "a132f7b970b647cd158f591d764c19ec41a8cf27c398c87758f74efb5a8a22c0"
