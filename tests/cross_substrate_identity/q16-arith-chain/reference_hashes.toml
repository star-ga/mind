# mind-bench reference hashes — RFC 0020 §5. See dot-l2-q16/reference_hashes.toml
# for full provenance/signing notes.
#
# A scalar Q16.16 arithmetic chain `((a*b)+(b*c))-(a*c)`, each `*` a Q16.16
# product `(x*y) >> 16`, over three fixed exact-representable inputs. Each op is
# exact integer arithmetic (i64 multiply, arithmetic shift-right, add/sub) with a
# single deterministic truncating shift per product — no accumulation order, no
# contraction, no reassociation — so the value is architecture-independent:
# avx2 == neon by construction (RFC 0015 §3.1). Any divergence is a real
# fixed-point lowering bug (e.g. a dropped or extra shift) and a release-blocker.
#
#   avx2 — verified on x86_64 (CI job `cross_substrate_identity`, ubuntu-24.04):
#          lowers to i64 imul / sar / add / sub.
#   neon — VERIFIED byte-identical on real ARM64 (NEON) hardware 2026-07-05
#          (GCP Ampere Altra aarch64, LLVM 20.1.8, MIND_BENCH_REQUIRE=1): this
#          exact hash reproduced, matching the x86_64 reference. Continuously
#          enforced on aarch64 (CI job `cross_substrate_identity`,
#          ubuntu-24.04-arm) per RFC 0015 §3.1 / RFC 0020 §10: the aarch64
#          integer mul / asr / add / sub reproduce the identical bytes every run.

