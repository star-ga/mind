#          MT output == ST output == scalar int32 oracle, hash == 917d353b…
#          on a genuinely multi-core host (T > 1 → real worker threads).
#   neon — VERIFIED byte-identical on real ARM64 (NEON) hardware 2026-07-05
#          (GCP Ampere Altra aarch64, LLVM 20.1.8, MIND_BENCH_REQUIRE=1): the
#          single-thread gemm-i8 hash reproduced there, and the MT kernel is
#          byte-identical to it by owner-computes construction on every
#          substrate. Continuously enforced on aarch64 (CI job
#          `cross_substrate_identity`, ubuntu-24.04-arm) per RFC 0015 §3.1 /
#          RFC 0020 §10.

