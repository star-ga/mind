# mind-bench reference hashes — RFC 0020 §5. See dot-l2-q16/reference_hashes.toml
# for full provenance/signing notes.
#
# The MULTITHREADED int8 GEMM. Its output is byte-for-byte identical to the
# single-thread gemm-i8-64x64x64 kernel BY CONSTRUCTION: the M output rows are
# partitioned into contiguous owner-computes thread bands with no cross-thread
# reduction, no atomic and no shared accumulator, and integer add is associative
