# mind-bench workload manifest — RFC 0020 §4.3. See dot-l2-q16/manifest.toml
# for the full format notes.
#
# The VNNI (VPDPBUSD) int-dot rung of the "det.igemm" tier: the SAME square int8
# GEMM as gemm-i8-64x64x64, but compiled with MIND_INTDOT=vnni so the kernel
# emits the explicit @llvm.x86.avx512.vpdpbusd.256 intrinsic. VPDPBUSD is
# u8 × s8 → i32; our inputs are SIGNED int8, so the kernel applies the exact
# integer bias identity Σ aₛ·bₛ = Σ (aₛ+128)·bₛ − 128·Σ bₛ (all terms exact i32),
# making the VNNI rung byte-for-byte identical to the AVX2 vpmaddwd default. Its
# output hash MUST therefore equal the committed single-thread gemm-i8 reference
# (917d353b…). avx2 == neon by the same construction (RFC 0015 §3.1).
#
# HARDWARE: the compiled kernel needs AVX-512-VNNI (Ice Lake / Sapphire Rapids+,
# or an AVX-VNNI part) to RUN — on a non-VNNI host the gate DEFERS LOUDLY (never
# a stub-green). This manifest documents the rung so the wedge is guarded the
# moment VNNI auto-select can fire. The output is the M×N INT32 result matrix;
# canonical encoding is each i32 little-endian, then sha256.

version = "1"
name = "gemm-i8-vnni-64x64x64"
description = "VNNI (VPDPBUSD) int8 square GEMM C = A.B (det.igemm int-dot rung, MIND_INTDOT=vnni); signed-input bias correction makes it byte-for-byte identical to the AVX2 gemm-i8 hash — the VPDPBUSD rung byte-identity canary (VNNI hardware only)."
weight = 2.0
substrates = ["avx2", "neon"]

[input]
generator = "lcg"          # A (m*k i8) generated before B (k*n i8); sample = (x>>16 as i32) as i8
seed = 3735928559          # 0xDEADBEEF
m = 64
k = 64
n = 64
dtype = "i8"               # A is m*k row-major i8; B is k*n row-major i8; C is m*n row-major i32

[kernel]
symbol = "gemmi8"          # SRC compiled with MIND_INTDOT=vnni; one call to __mind_blas_matmul_mm_i8_v (a, b, c, m, k, n)
int_dot_rung = "vnni"      # MIND_INTDOT=vnni selects VPDPBUSD (default is AVX2 vpmaddwd)
returns = "i64"            # status (0 ok); result written to caller C buffer
output_encoding = "i32_le_matrix"  # m*n i32, row-major, each little-endian, then sha256
