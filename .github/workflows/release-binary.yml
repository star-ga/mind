name: Release Binary

# Builds pre-compiled mindc binaries for Linux (static musl), macOS (universal),
# and Windows (MSVC) and attaches them to the GitHub Release created for the tag.
# Triggered by a semver tag push (v*.*.*) or manually via workflow_dispatch.
#
# Cosign signing is stubbed (STARGA_COSIGN_KEY secret checked at runtime);
# wire the secret in the repo settings to enable it.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.6.9) — must already exist on origin'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

# ── Helper: resolve tag / version strings ─────────────────────────────────────
# Both jobs and the release step need these; computed once in a tiny prep job
# and surfaced as outputs.

jobs:
  prep:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag + version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building tag=${TAG}  version=${VERSION}"

  # ── Linux static binary (musl) ───────────────────────────────────────────────
  linux-x86_64-musl:
    name: Linux x86_64 (musl static)
    needs: prep
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-musl
      VERSION: ${{ needs.prep.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prep.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-musl-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: linux-musl-

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build static binary
        run: |
          cargo build --release --no-default-features \
            --target x86_64-unknown-linux-musl --bin mindc

      - name: Stage artifact
        run: |
          ASSET="mindc-v${VERSION}-x86_64-unknown-linux-musl"
          cp target/x86_64-unknown-linux-musl/release/mindc "${ASSET}"
          sha256sum "${ASSET}" > "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Sign with cosign (stubbed — requires STARGA_COSIGN_KEY secret)
        if: ${{ secrets.STARGA_COSIGN_KEY != '' }}
        env:
          COSIGN_KEY: ${{ secrets.STARGA_COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.STARGA_COSIGN_PASSWORD }}
        run: |
          curl -sSL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 \
            -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
          cosign sign-blob --key env://COSIGN_KEY \
            --output-signature "${ASSET}.sig" "${ASSET}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-musl
          path: |
            mindc-v${{ env.VERSION }}-x86_64-unknown-linux-musl
            mindc-v${{ env.VERSION }}-x86_64-unknown-linux-musl.sha256
            mindc-v${{ env.VERSION }}-x86_64-unknown-linux-musl.sig

  # ── macOS universal binary ───────────────────────────────────────────────────
  macos-universal:
    name: macOS universal (x86_64 + arm64)
    needs: prep
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prep.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prep.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-universal-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: macos-universal-

      - name: Build x86_64
        run: |
          cargo build --release --no-default-features \
            --target x86_64-apple-darwin --bin mindc

      - name: Build arm64
        run: |
          cargo build --release --no-default-features \
            --target aarch64-apple-darwin --bin mindc

      - name: Combine with lipo
        run: |
          ASSET="mindc-v${VERSION}-x86_64-apple-darwin-universal"
          lipo -create -output "${ASSET}" \
            target/x86_64-apple-darwin/release/mindc \
            target/aarch64-apple-darwin/release/mindc
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Sign with cosign (stubbed — requires STARGA_COSIGN_KEY secret)
        if: ${{ secrets.STARGA_COSIGN_KEY != '' }}
        env:
          COSIGN_KEY: ${{ secrets.STARGA_COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.STARGA_COSIGN_PASSWORD }}
        run: |
          curl -sSL https://github.com/sigstore/cosign/releases/latest/download/cosign-darwin-amd64 \
            -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
          cosign sign-blob --key env://COSIGN_KEY \
            --output-signature "${ASSET}.sig" "${ASSET}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            mindc-v${{ env.VERSION }}-x86_64-apple-darwin-universal
            mindc-v${{ env.VERSION }}-x86_64-apple-darwin-universal.sha256
            mindc-v${{ env.VERSION }}-x86_64-apple-darwin-universal.sig

  # ── Windows x86_64 MSVC ──────────────────────────────────────────────────────
  windows-x86_64-msvc:
    name: Windows x86_64 (MSVC)
    needs: prep
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
      VERSION: ${{ needs.prep.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prep.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: windows-msvc-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: windows-msvc-

      - name: Build binary
        run: |
          cargo build --release --no-default-features `
            --target x86_64-pc-windows-msvc --bin mindc

      - name: Stage artifact + SHA256
        shell: pwsh
        run: |
          $ver  = $env:VERSION
          $src  = "target\x86_64-pc-windows-msvc\release\mindc.exe"
          $asset = "mindc-v${ver}-x86_64-pc-windows-msvc.exe"
          Copy-Item $src $asset
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${asset}.sha256" -Value "${hash}  ${asset}"
          echo "ASSET=${asset}" >> $env:GITHUB_ENV

      - name: Sign with cosign (stubbed — requires STARGA_COSIGN_KEY secret)
        if: ${{ secrets.STARGA_COSIGN_KEY != '' }}
        shell: pwsh
        env:
          COSIGN_KEY: ${{ secrets.STARGA_COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.STARGA_COSIGN_PASSWORD }}
        run: |
          Invoke-WebRequest -Uri "https://github.com/sigstore/cosign/releases/latest/download/cosign-windows-amd64.exe" `
            -OutFile "cosign.exe"
          .\cosign.exe sign-blob --key env://COSIGN_KEY `
            --output-signature "${env:ASSET}.sig" $env:ASSET

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-msvc
          path: |
            mindc-v${{ env.VERSION }}-x86_64-pc-windows-msvc.exe
            mindc-v${{ env.VERSION }}-x86_64-pc-windows-msvc.exe.sha256
            mindc-v${{ env.VERSION }}-x86_64-pc-windows-msvc.exe.sig

  # ── GitHub Release: collect all artifacts + publish ──────────────────────────
  release:
    name: Publish GitHub Release
    needs: [prep, linux-x86_64-musl, macos-universal, windows-x86_64-msvc]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prep.outputs.version }}
      TAG: ${{ needs.prep.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prep.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build SHA256SUMS manifest
        run: |
          cd artifacts
          # Collect individual .sha256 sidecar files into one manifest
          for f in *.sha256; do
            cat "$f"
          done | sort > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: MIND Compiler ${{ env.TAG }}
          draft: false
          prerelease: ${{ contains(env.TAG, 'alpha') || contains(env.TAG, 'beta') || contains(env.TAG, 'rc') }}
          fail_on_unmatched_files: false
          body: |
            ## MIND Compiler ${{ env.TAG }}

            Pre-built `mindc` binaries — no Rust toolchain required.

            ### One-line install

            **Linux / macOS**
            ```sh
            curl -sSL https://mindlang.dev/install.sh | sh
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://mindlang.dev/install.ps1 | iex
            ```

            ### Manual downloads

            | Platform | Architecture | Asset |
            |----------|-------------|-------|
            | Linux    | x86_64 (static musl) | `mindc-${{ env.TAG }}-x86_64-unknown-linux-musl` |
            | macOS    | Universal (x86_64 + arm64) | `mindc-${{ env.TAG }}-x86_64-apple-darwin-universal` |
            | Windows  | x86_64 (MSVC) | `mindc-${{ env.TAG }}-x86_64-pc-windows-msvc.exe` |

            Verify your download against `SHA256SUMS`.

            ### Build from source
            ```sh
            cargo install --git https://github.com/star-ga/mind --bin mindc
            ```

            See [`docs/install.md`](https://github.com/star-ga/mind/blob/main/docs/install.md) for full instructions.
          files: |
            artifacts/mindc-v${{ env.VERSION }}-x86_64-unknown-linux-musl
            artifacts/mindc-v${{ env.VERSION }}-x86_64-unknown-linux-musl.sha256
            artifacts/mindc-v${{ env.VERSION }}-x86_64-apple-darwin-universal
            artifacts/mindc-v${{ env.VERSION }}-x86_64-apple-darwin-universal.sha256
            artifacts/mindc-v${{ env.VERSION }}-x86_64-pc-windows-msvc.exe
            artifacts/mindc-v${{ env.VERSION }}-x86_64-pc-windows-msvc.exe.sha256
            artifacts/SHA256SUMS
