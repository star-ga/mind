name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE*'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUST_BACKTRACE: 1

jobs:
  build_test:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            name: macOS ARM64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows x86_64

    runs-on: ${{ matrix.os }}

    env:
      # neutralize proxies
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: clippy,rustfmt

      - name: Cache cargo registry (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo registry (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Remove git proxies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          git config --global --unset-all http.proxy  || true
          git config --global --unset-all https.proxy || true

      - name: Remove git proxies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global --unset http.proxy 2>&1 | Out-Null
          git config --global --unset https.proxy 2>&1 | Out-Null
        continue-on-error: true

      - name: Cargo metadata (smoke)
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo metadata --format-version=1 --locked
          else
            cargo metadata --format-version=1
          fi

      - name: Check compiles (no features)
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo check --no-default-features --locked
          else
            cargo check --no-default-features
          fi

      - name: Feature compile matrix
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo check --no-default-features --locked
            cargo check --no-default-features --features cpu-exec --locked
            cargo check --no-default-features --features pkg --locked
          else
            cargo check --no-default-features
            cargo check --no-default-features --features cpu-exec
            cargo check --no-default-features --features pkg
          fi

      - name: Build
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo build --verbose --no-default-features --locked
          else
            cargo build --verbose --no-default-features
          fi

      - name: Test
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo test --verbose --no-default-features --locked
          else
            cargo test --verbose --no-default-features
          fi

      - name: Test (gated — RFC 0005 std-surface + cross-module-imports)
        # The RFC 0005 Phase 2 / Phase B work (std/vec.mind, std/string.mind,
        # std/map.mind, std/io.mind, plus the `use std.foo` resolver + the
        # per-arg signature matching on imported `pub fn`s) lives entirely
        # behind these two feature flags. The default-build test job above
        # does NOT compile them, so without this explicit gated run the
        # 45+17 gated tests are at risk of silent breakage. Both features
        # are mutually independent + must work on their own + together.
        shell: bash
        run: |
          set -e
          # Each feature alone — proves the gate is well-bounded.
          cargo test --verbose --no-default-features --features std-surface
          cargo test --verbose --no-default-features --features cross-module-imports
          # Both together — full RFC 0005 surface (Phase 2 + Phase B).
          cargo test --verbose --no-default-features --features std-surface,cross-module-imports

      - name: Run gated tests — autodiff + mlir-lowering + cpu-buffers
        # Five tests live behind these three feature flags and were never
        # executed in any CI matrix row before the 2026-05-19 stale-test
        # sweep:
        #   - tests/pipeline.rs::compile_source_runs_autodiff       (autodiff)
        #   - tests/pipeline.rs::pipeline_emits_grad_ir             (autodiff)
        #   - tests/pipeline.rs::lower_to_mlir_produces_stable_text (mlir-lowering)
        #   - tests/tensor_buffers.rs::* (2 tests)                  (cpu-buffers)
        # The default-build job above did `cargo check --features cpu-exec`
        # without running tests, so cpu-buffers / autodiff regressions
        # would have shipped silently.
        shell: bash
        run: |
          set -e
          cargo test --verbose --no-default-features --features autodiff
          cargo test --verbose --no-default-features --features mlir-lowering
          cargo test --verbose --no-default-features --features cpu-buffers

      - name: Clippy
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo clippy --no-default-features --locked -- -D warnings
          else
            cargo clippy --no-default-features -- -D warnings
          fi

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-default-features --document-private-items

  mindcraft_check:
    name: Mindcraft check (RFC 0007 Phase 6)
    runs-on: ubuntu-latest
    # Lint warnings should not block the compile+test CI matrix during the
    # initial rollout.  Once the std/ and examples/ tree is fully clean this
    # flag can be removed.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mindcraft-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-mindcraft-

      - name: Build mindc
        run: cargo build --release --no-default-features --bin mindc

      - name: Run mindc check on std/ and examples/
        run: |
          cargo run --release --no-default-features --bin mindc -- \
            check std/ examples/

  # MSRV check temporarily disabled - ar_archive_writer 0.5.x requires nightly features
  # Will re-enable when stable Rust supports edition 2024 let-chains
  # msrv:
  #   name: Minimum Supported Rust Version
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Install Rust 1.85
  #       uses: dtolnay/rust-toolchain@1.85
  #
  #     - name: Check MSRV compiles
  #       run: cargo check --no-default-features
