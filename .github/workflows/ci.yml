name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE*'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUST_BACKTRACE: 1

jobs:
  build_test:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            name: macOS ARM64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows x86_64

    runs-on: ${{ matrix.os }}
    # Healthy matrix jobs finish in 4-9 min (Windows is slowest at ~8m); GitHub's
    # default cap is 6 HOURS. A scarce macos-14 ARM64 runner that stalls in
    # `cargo test` therefore burns hours before being killed and reported as an
    # opaque "failure". Bound it so a stall fails fast and legibly as `timed_out`
    # in 30 min (~4x headroom) — without masking any genuine test failure.
    timeout-minutes: 30

    env:
      # neutralize proxies
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: clippy,rustfmt

      - name: Cache cargo registry (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo registry (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Remove git proxies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          git config --global --unset-all http.proxy  || true
          git config --global --unset-all https.proxy || true

      - name: Remove git proxies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global --unset http.proxy 2>&1 | Out-Null
          git config --global --unset https.proxy 2>&1 | Out-Null
        continue-on-error: true

      - name: Cargo metadata (smoke)
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo metadata --format-version=1 --locked
          else
            cargo metadata --format-version=1
          fi

      - name: Check compiles (no features)
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo check --no-default-features --locked
          else
            cargo check --no-default-features
          fi

      - name: Feature compile matrix
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo check --no-default-features --locked
            cargo check --no-default-features --features cpu-exec --locked
            cargo check --no-default-features --features pkg --locked
          else
            cargo check --no-default-features
            cargo check --no-default-features --features cpu-exec
            cargo check --no-default-features --features pkg
          fi

      - name: Build
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo build --verbose --no-default-features --locked
          else
            cargo build --verbose --no-default-features
          fi

      - name: Test
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo test --verbose --no-default-features --locked
          else
            cargo test --verbose --no-default-features
          fi

      - name: Test (gated — RFC 0005 std-surface + cross-module-imports)
        # The RFC 0005 Phase 2 / Phase B work (std/vec.mind, std/string.mind,
        # std/map.mind, std/io.mind, plus the `use std.foo` resolver + the
        # per-arg signature matching on imported `pub fn`s) lives entirely
        # behind these two feature flags. The default-build test job above
        # does NOT compile them, so without this explicit gated run the
        # 45+17 gated tests are at risk of silent breakage. Both features
        # are mutually independent + must work on their own + together.
        shell: bash
        run: |
          set -e
          # Each feature alone — proves the gate is well-bounded.
          cargo test --verbose --no-default-features --features std-surface
          cargo test --verbose --no-default-features --features cross-module-imports
          # Both together — full RFC 0005 surface (Phase 2 + Phase B).
          cargo test --verbose --no-default-features --features std-surface,cross-module-imports

      - name: Run gated tests — autodiff + mlir-lowering + cpu-buffers
        # Five tests live behind these three feature flags and were never
        # executed in any CI matrix row before the 2026-05-19 stale-test
        # sweep:
        #   - tests/pipeline.rs::compile_source_runs_autodiff       (autodiff)
        #   - tests/pipeline.rs::pipeline_emits_grad_ir             (autodiff)
        #   - tests/pipeline.rs::lower_to_mlir_produces_stable_text (mlir-lowering)
        #   - tests/tensor_buffers.rs::* (2 tests)                  (cpu-buffers)
        # The default-build job above did `cargo check --features cpu-exec`
        # without running tests, so cpu-buffers / autodiff regressions
        # would have shipped silently.
        shell: bash
        run: |
          set -e
          cargo test --verbose --no-default-features --features autodiff
          cargo test --verbose --no-default-features --features mlir-lowering
          cargo test --verbose --no-default-features --features cpu-buffers

      - name: Clippy
        shell: bash
        run: |
          if [ -f Cargo.lock ]; then
            cargo clippy --no-default-features --locked -- -D warnings
          else
            cargo clippy --no-default-features -- -D warnings
          fi

  cross_substrate_identity:
    # RFC 0020 §10 — the wedge's load-bearing invariant made enforceable: a
    # Q16.16 workload MUST hash byte-identically on every substrate (RFC 0015
    # §3.1). x86_64 verifies the `avx2` reference; the Linux ARM runner verifies
    # the `neon` reference on real aarch64 hardware — without it the committed
    # neon hash is an unverified copy of avx2 and an ARM lowering divergence
    # would ship green. MIND_BENCH_REQUIRE=1 turns a missing MLIR toolchain into
    # a hard failure so the gate can never pass vacuously.
    name: Cross-substrate bit-identity (${{ matrix.substrate }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            substrate: avx2
          - runner: ubuntu-24.04-arm
            substrate: neon
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30  # build mindc + run the ELF byte-identity gate; bound stalls

    env:
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""
      MIND_BENCH_REQUIRE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-xsi-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ matrix.runner }}-xsi-

      - name: Install MLIR toolchain (Ubuntu 24.04 LLVM 20)
        # Noble universe also packages llvm-20 (1:20.1.2); we pin it on both
        # x86_64 and arm64 so the gate shells out to unversioned mlir-opt /
        # mlir-translate / clang in /usr/lib/llvm-20/bin. The wedge is
        # LLVM-version-independent (the gate hashes the Q16.16 result, not
        # codegen) — verified to match the llvm-18-blessed references.
        run: |
          # ports.ubuntu.com (arm64 mirror) has transient outages that red the
          # ARM leg on an UPSTREAM issue, not a code defect. Retry up to 5x with
          # backoff + --fix-missing before failing; the byte-identity assertion
          # itself is unchanged.
          ok=0
          for attempt in 1 2 3 4 5; do
            sudo apt-get update || true
            if sudo apt-get install -y --fix-missing mlir-20-tools clang-20; then ok=1; break; fi
            echo "apt attempt $attempt failed (mirror outage?); retry in $((attempt * 20))s"
            sleep $((attempt * 20))
          done
          [ "$ok" = 1 ] || { echo "MLIR toolchain unavailable after 5 attempts (upstream apt mirror outage)"; exit 1; }
          echo "/usr/lib/llvm-20/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain on PATH
        run: |
          mlir-opt --version | head -1
          mlir-translate --version | head -1
          clang --version | head -1

      - name: Build mindc (MLIR backend)
        run: |
          cargo build --no-default-features \
            --features "mlir-build std-surface cross-module-imports" --bin mindc

      - name: Cross-substrate reproducibility gate
        # Host substrate (avx2 on x86_64, neon on aarch64) is verified here;
        # the other substrate is verified on its sibling matrix runner.
        run: |
          cargo test --no-default-features \
            --features "mlir-build std-surface cross-module-imports" \
            --test cross_substrate_identity -- --nocapture

      - name: Harvest per-substrate canary hashes (bless manifest)
        # NOT a gate — the gate above already ran and had to pass. This is a
        # BLESS-mode replay whose only product is a durable artifact listing the
        # hash this substrate's REAL hardware computed for every canary.
        #
        # Why it exists: the strict-f32 `neon` lines went unblessed for months
        # even though the ubuntu-24.04-arm runner (real aarch64) had been
        # computing the correct hashes on every single CI run — and discarding
        # them into a job log that expires. Closing that hole required scraping
        # an old log. With this step, blessing a canary on a substrate we do not
        # own locally is a `gh run download`, not archaeology.
        #
        # Fail-safe by construction: MIND_BENCH_BLESS makes the run assert
        # NOTHING, so this step can neither turn a red gate green nor weaken the
        # gate above. It only records what the hardware said.
        env:
          MIND_BENCH_BLESS: "1"
          MIND_BENCH_HASHES_OUT: ${{ github.workspace }}/canary_hashes_${{ matrix.substrate }}.txt
        run: |
          cargo test --no-default-features \
            --features "mlir-build std-surface cross-module-imports" \
            --test cross_substrate_identity -- --nocapture
          echo "--- harvested (${{ matrix.substrate }}, $(uname -m)) ---"
          sort -o "$MIND_BENCH_HASHES_OUT" "$MIND_BENCH_HASHES_OUT"
          cat "$MIND_BENCH_HASHES_OUT"

      - name: Upload per-substrate canary hashes (${{ matrix.substrate }})
        uses: actions/upload-artifact@v4
        with:
          name: canary-hashes-${{ matrix.substrate }}
          path: ${{ github.workspace }}/canary_hashes_${{ matrix.substrate }}.txt
          if-no-files-found: error
          retention-days: 30

      - name: Differential determinism fuzzer (issue #72)
        # Seeded generator (0xDEADBEEF) emits a bounded batch of valid MIND
        # programs over `+ - * / % << >> |` and `if/else`; each is proven a mic@3
        # byte fixed point AND differentially executed through THREE oracles that
        # must agree — native-ELF == in-test interpreter == mic@3 bytecode VM (the
        # decoded mic@3 is RUN, not just hashed, so an operator correct in only
        # one lowering path — the `%`-class silent miscompile — turns this RED).
        # Runs on BOTH matrix substrates and writes the batch mic@3 digest (which
        # is substrate-independent by construction, RFC 0015 §3.1) to a file so
        # the dependent `mindfuzz_cross_runner_identity` job can ASSERT x86 == ARM
        # across the two runners — not merely print it.
        env:
          MINDFUZZ_DIGEST_OUT: ${{ github.workspace }}/mindfuzz_digest_${{ matrix.substrate }}.txt
        run: |
          cargo test --no-default-features \
            --features "mlir-build std-surface cross-module-imports" \
            --test mindfuzz_cross_substrate -- --nocapture

      - name: Upload fuzzer batch mic@3 digest (${{ matrix.substrate }})
        # One artifact per substrate; the cross-runner job downloads both and
        # byte-compares them. A per-substrate name keeps the two uploads distinct.
        uses: actions/upload-artifact@v4
        with:
          name: mindfuzz-digest-${{ matrix.substrate }}
          path: ${{ github.workspace }}/mindfuzz_digest_${{ matrix.substrate }}.txt
          if-no-files-found: error
          retention-days: 7

  mindfuzz_cross_runner_identity:
    # RANK 1 (existential): make the fuzzer's cross-runner mic@3 digest a real
    # ASSERTION, not a print. mic@3 is emitted before any substrate lowering and
    # is substrate-independent by construction (RFC 0015 §3.1), so the batch
    # digest the avx2 (x86_64) runner computes over the seeded corpus MUST equal
    # the one the neon (real aarch64) runner computes. This job downloads both
    # runners' digest artifacts and FAILS RED on any mismatch — a real x86 != ARM
    # divergence in the fuzzed corpus can no longer ship green (MIND-CONSTITUTION
    # §I.4). `needs:` gates it on both matrix legs producing their artifact.
    name: Fuzzer cross-runner mic@3 identity (avx2 == neon)
    needs: cross_substrate_identity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download avx2 digest
        uses: actions/download-artifact@v4
        with:
          name: mindfuzz-digest-avx2
          path: avx2

      - name: Download neon digest
        uses: actions/download-artifact@v4
        with:
          name: mindfuzz-digest-neon
          path: neon

      - name: Assert avx2 batch digest == neon batch digest
        # Genuine cross-runner byte compare. mic@3 carries no machine bytes, so
        # any difference here is a real cross-substrate divergence in the fuzzed
        # corpus — a wedge break — and MUST fail the build.
        run: |
          set -euo pipefail
          AVX2="$(cat avx2/mindfuzz_digest_avx2.txt)"
          NEON="$(cat neon/mindfuzz_digest_neon.txt)"
          echo "avx2 (x86_64) batch mic@3 digest = ${AVX2}"
          echo "neon (aarch64) batch mic@3 digest = ${NEON}"
          if [ -z "${AVX2}" ] || [ -z "${NEON}" ]; then
            echo "FAIL: a batch digest is empty — the fuzzer did not run on a substrate"
            exit 1
          fi
          if [ "${AVX2}" != "${NEON}" ]; then
            echo "FAIL: fuzzer mic@3 batch digest DIVERGED across substrates."
            echo "      mic@3 is substrate-independent by construction (RFC 0015 §3.1);"
            echo "      a difference is a real x86 != ARM cross-substrate wedge break."
            exit 1
          fi
          echo "PASS: avx2 == neon — fuzzed corpus is byte-identical mic@3 across substrates."

  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-default-features --document-private-items

  mindcraft_self_host:
    name: Mindcraft self-host (RFC 0008 Phase G — KEYSTONE)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # MIND_BENCH_REQUIRE=1 makes the keystone fail-closed: a missing MLIR
    # toolchain or a launcher-stub artifact becomes a hard failure instead of a
    # silent skip (#306). With the toolchain installed below this passes
    # deterministically — the keystone verifies SELF-CONSISTENCY (two clean
    # builds of the self-host .so in this environment are byte-identical), not a
    # match against a committed cross-toolchain binary oracle (which would be
    # clang-patch-version specific and unworkable to commit).
    env:
      MIND_BENCH_REQUIRE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mindcraft-self-host-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-mindcraft-self-host-

      - name: Install MLIR toolchain (Ubuntu 24.04 LLVM 20)
        # The cdylib/self-host emit lowers MIND IR to MLIR text and shells out to
        # mlir-opt + mlir-translate + clang to produce the .so (the in-process
        # melior/inkwell LLVM crates were removed 2026-05-21, but the emit still
        # uses these LLVM/MLIR subprocess tools), so the keystone DOES depend on
        # this toolchain. Pinned to llvm-20 for parity with the cross-substrate
        # gate's toolchain and the --emit-shared sub-steps.
        run: |
          # ports.ubuntu.com (arm64 mirror) has transient outages that red the
          # ARM leg on an UPSTREAM issue, not a code defect. Retry up to 5x with
          # backoff + --fix-missing before failing; the byte-identity assertion
          # itself is unchanged.
          ok=0
          for attempt in 1 2 3 4 5; do
            sudo apt-get update || true
            if sudo apt-get install -y --fix-missing mlir-20-tools clang-20; then ok=1; break; fi
            echo "apt attempt $attempt failed (mirror outage?); retry in $((attempt * 20))s"
            sleep $((attempt * 20))
          done
          [ "$ok" = 1 ] || { echo "MLIR toolchain unavailable after 5 attempts (upstream apt mirror outage)"; exit 1; }
          echo "/usr/lib/llvm-20/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain on PATH
        run: |
          mlir-opt --version | head -1
          mlir-translate --version | head -1
          clang --version | head -1

      - name: Build mindc (MLIR backend)
        run: |
          cargo build --release --no-default-features \
            --features "mlir-build std-surface cross-module-imports" --bin mindc

      - name: Self-host bootstrap via mindc build (Mind.toml)
        run: |
          ./target/release/mindc build --release --emit=cdylib \
            --out=/tmp/libmindc_mind_self_host.so
        working-directory: ${{ github.workspace }}

      - name: Verify artifact is non-empty
        run: |
          if [ ! -f /tmp/libmindc_mind_self_host.so ]; then
            echo "ERROR: artifact not produced by mindc build"
            exit 1
          fi
          SZ=$(stat -c%s /tmp/libmindc_mind_self_host.so)
          echo "Artifact size: ${SZ} bytes"
          if [ "$SZ" -eq 0 ]; then
            echo "ERROR: artifact is empty"
            exit 1
          fi

      - name: Byte-identity check (Mind.toml-driven vs direct-path)
        run: |
          ./target/release/mindc build \
            examples/mindc_mind/main.mind \
            --release --emit=cdylib \
            --out=/tmp/libmindc_mind_direct.so
          if cmp -s /tmp/libmindc_mind_self_host.so /tmp/libmindc_mind_direct.so; then
            echo "KEYSTONE PASS: byte-identical"
            sha256sum /tmp/libmindc_mind_self_host.so
          else
            echo "KEYSTONE FAIL: Mind.toml-driven and direct-path artifacts differ"
            sha256sum /tmp/libmindc_mind_self_host.so /tmp/libmindc_mind_direct.so
            exit 1
          fi

      - name: Real-body emitter smoke (self_host_body_smoke.py)
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
            python3 examples/mindc_mind/self_host_body_smoke.py
        working-directory: ${{ github.workspace }}

      - name: mic@3 primitives smoke (mic3_primitives_smoke.py)
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
            python3 examples/mindc_mind/mic3_primitives_smoke.py
        working-directory: ${{ github.workspace }}

      - name: Whole-module mic@3 self-host FLIP (mic3_flip_smoke.py)
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
          MINDC=${{ github.workspace }}/target/release/mindc \
            python3 examples/mindc_mind/mic3_flip_smoke.py
        working-directory: ${{ github.workspace }}

      - name: Per-arm oracle-parity linter (oracle_parity_lint.py)
        # Localises which self-host ARM drifted from the Rust oracle. The
        # whole-module FLIP above reports one byte offset on the full stream;
        # this asserts each construct's mic@3 bytes are byte-identical to
        # `mindc --emit-mic3` and prints the SHA-256 of both sides on any drift,
        # so an emitter/oracle divergence is diagnosed per-construct and can
        # never land silently. MINDC_SO is set, so it fails closed (never skips).
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
          MINDC=${{ github.workspace }}/target/release/mindc \
            python3 examples/mindc_mind/oracle_parity_lint.py
        working-directory: ${{ github.workspace }}

      - name: Self-host gap-corpus integrity gate (gap_corpus_smoke.py)
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
          MINDC=${{ github.workspace }}/target/release/mindc \
            python3 examples/mindc_mind/gap_corpus_smoke.py
        working-directory: ${{ github.workspace }}

      - name: Self-host LOOP gate — MIND compiles MIND, Rust+LLVM out (self_host_loop_smoke.py)
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
            python3 examples/mindc_mind/self_host_loop_smoke.py
        working-directory: ${{ github.workspace }}

      - name: Native-ELF scalar-f64 execution gate (self_host_native_fp_smoke.py)
        # RI-B1 native-ELF float column (roadmap C1). No frozen float byte-oracle
        # can exist (the deleted Rust native backend rejected ConstF64), so the CPU
        # is the oracle: emit the pure-MIND SSE2 ELF, run it, assert the exit code
        # equals trunc(a OP b) for reg-form AND mem-operand [rbp+d32] encoders. A
        # wrong SSE encoding faults or returns the wrong integer — non-fakeable.
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
            python3 examples/mindc_mind/self_host_native_fp_smoke.py
        working-directory: ${{ github.workspace }}

      - name: Native-ELF integer byte-identity gate (self_host_native_elf_smoke.py)
        # Per-fixture byte-identity of the pure-MIND native-ELF emitter vs the frozen
        # Rust `mind-native` oracle (add/if_ret/value_if/recursion/struct_field), FED
        # and NO-FEED (self-computed PT_NOTE == pinned Rust emit_mic3 reference), plus
        # the pure-MIND SHA-256 leg. MIND_SELFHOST_SKIP_REF_REGEN=1 pins the committed
        # _ref cache (refreshed in-tree via dump_ref) instead of a nested cargo build.
        # The whole-module main.mind rungs are DEFERRED (the frozen main.elf oracle is
        # unregenerable since src/native was deleted, and main.mind has grown) — the
        # smoke names that deferral loudly; the per-fixture byte-identity stays gated.
        env:
          MIND_SELFHOST_SKIP_REF_REGEN: "1"
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
            python3 examples/mindc_mind/self_host_native_elf_smoke.py
        working-directory: ${{ github.workspace }}

      - name: Native-ELF float end-to-end gate (self_host_native_fp_expr_smoke.py)
        # RI-B1 CAPSTONE (roadmap C1): nb_expr now routes an ast_float_lit's value
        # through the SSE2 scalar-double encoders (nb_fp_const_xmm + movsd-store to the
        # value's [rbp+d32] slot), NOT the GP-integer const path. A REAL float source
        # literal is lexed + parsed + lowered THROUGH nb_expr, then loaded back to xmm0
        # and cvttsd2si -> exit(trunc(value)). No frozen float byte-oracle can exist
        # (the deleted Rust native backend rejected ConstF64), so the CPU is the oracle:
        # a wrong SSE encoding or wrong IEEE-754 bits faults or returns the wrong integer
        # — non-fakeable execution-correctness. main.mind's own source stays float-free,
        # so this arm is never taken during self-compile (integer byte-identity holds).
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
            python3 examples/mindc_mind/self_host_native_fp_expr_smoke.py
        working-directory: ${{ github.workspace }}

      - name: Self-host ADDITIVE selftest gates (C4 tensor ops + type-checker rules + narrow/f32/div)
        # These smokes exercise ADDITIVE selftest_* exports (the C4 native-ELF
        # tensor ops ewadd/dot/matmul; the pure-MIND type-checker rule ports
        # E2004/E2005/E2010/E2011/E2013/E2016/E2023/E2101/E2102/E2103; the E2008
        # unknown-variant + E2024 intrinsic-table advisory rules; and the B1
        # scope-frame engine — D1 module decl-name set, D2 nested scope-frame
        # walk, D3 std-surface export set, D4 assembled E2012 fn-value-call
        # rule — whose THREE-WAY smokes ALSO run the
        # live `mindc check` oracle leg (MINDC_BIN below points them at the
        # just-built mindc; without it their leg-3 subprocess would FileNotFound);
        # narrow-int store/load + wrap + declared-width driver; scalar f32;
        # div/shift/cmp edges; % operator; and the self-host arena-headroom
        # canary). They are reached ONLY via the selftest_* exports, never
        # through mindc_compile, so the self-host LOOP + native-ELF byte-identity
        # gates above do NOT cover their correctness — a regression in an additive
        # emitter/rule would otherwise land CI-green. MINDC_SO is set, so every
        # smoke fails closed (never SKIPs). fast_keystone.sh runs the SAME set
        # locally; when adding a new additive selftest smoke, wire it into BOTH.
        run: |
          set -e
          for s in \
            self_host_native_tensor_ewadd_smoke \
            self_host_native_tensor_dot_smoke \
            self_host_native_tensor_matmul_smoke \
            self_host_native_tensor_rowsum_smoke \
            self_host_native_tensor_transpose_smoke \
            self_host_native_tensor_ewmul_smoke \
            self_host_native_tensor_colsum_smoke \
            self_host_native_tensor_bcastadd_smoke \
            self_host_standalone_driver_smoke \
            self_host_native_tensor_maxrowmax_smoke \
            self_host_native_tensor_relu_smoke \
            self_host_native_narrow_add_i8_smoke \
            self_host_native_narrow_arith_batch_smoke \
            self_host_native_toplevel_assign_smoke \
            self_host_native_narrow_paramret_smoke \
            self_host_native_tensor_batchsum_smoke \
            self_host_native_tensor_rowmin_smoke \
            self_host_param_mutation_smoke \
            self_host_float_lit_exact_smoke \
            self_host_carry_cap_smoke \
            self_host_narrow_param_smoke \
            self_host_tc_let_class_mismatch_smoke \
            self_host_tc_fixed_bytes_into_vec_smoke \
            self_host_tc_shape_annot_compat_smoke \
            self_host_tc_classify_error_code_smoke \
            self_host_native_narrowint_smoke \
            self_host_native_narrowwrap_smoke \
            self_host_native_autowrap_smoke \
            self_host_native_scalar_f32_smoke \
            div_shift_cmp_edge_smoke \
            mod_operator_smoke \
            self_host_arena_growth_smoke \
            self_host_tc_narrowing_smoke \
            self_host_tc_class_mismatch_smoke \
            self_host_tc_class_rules_smoke \
            self_host_tc_shape_rules_smoke \
            self_host_tc_unknown_variant_smoke \
            self_host_tc_self_host_only_call_smoke \
            self_host_tc_decl_names_smoke \
            self_host_tc_scope_frame_smoke \
            self_host_tc_std_export_smoke \
            self_host_tc_fn_value_call_smoke \
            self_host_tc_unknown_ident_smoke \
            self_host_tc_undeclared_assign_smoke \
            self_host_tc_unknown_call_smoke; do
            echo "=== $s ==="
            MINDC_SO=/tmp/libmindc_mind_self_host.so \
            MINDC_BIN="${{ github.workspace }}/target/release/mindc" \
              python3 "examples/mindc_mind/$s.py"
          done
        working-directory: ${{ github.workspace }}

      - name: Differential fuzzer — tc-rule ports vs live mindc (tcdiff)
        # The self_host_tc_* smokes above are CURATED fixtures; tcdiff GENERATES
        # ~400 parseable MIND programs per rule and diffs the pure-MIND selftest
        # verdict against live `mindc check` over the token x position matrix the
        # hand corpus keeps missing. It found the folded-keyword fail-OPEN class
        # across E2002/E2003/E2009 that 3 fix rounds + 2 cross-family blind reviews
        # all missed while the curated smokes stayed green. Fixed seed => the same
        # programs every run (deterministic); a planted-mutant gate runs first and
        # proves it still catches a fail-open; any divergence fails the build. Cheap
        # (~10s: one `mindc check` per generated program, all 4 rules scored from it).
        run: |
          MINDC_SO=/tmp/libmindc_mind_self_host.so \
          MINDC_BIN="${{ github.workspace }}/target/release/mindc" \
            python3 examples/mindc_mind/tc_differential_fuzz.py --rule all --ci --budget 400
        working-directory: ${{ github.workspace }}

      - name: Run Phase G integration tests
        run: |
          cargo test --release --no-default-features \
            --features "mlir-build std-surface cross-module-imports" \
            --test phase_g_keystone_bootstrap -- --nocapture

  executable_miscompile_gate:
    name: Executable miscompile gate (compile + run + assert)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Compile a tiny deterministic MIND kernel to a cdylib, dlopen it, call it,
    # and ASSERT the one true integer result. The byte-identity keystone proves
    # two builds AGREE; this gate proves the compiled code actually COMPUTES the
    # right answer — it catches a silent miscompile that is self-consistent
    # across substrates (e.g. a wrong operator lowering) and would otherwise ship
    # green. The "Verify toolchain on PATH" step below is the fail-closed guard:
    # a missing MLIR toolchain makes `mindc build` error, so the gate cannot pass
    # vacuously. (MIND_BENCH_REQUIRE is only read by the Rust test harnesses, not
    # `mindc build`, so it would be inert in this job — deliberately omitted.)
    env:
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-exec-gate-${{ hashFiles('**/Cargo.toml', 'src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-exec-gate-

      - name: Install MLIR toolchain (Ubuntu 24.04 LLVM 20)
        run: |
          # ports.ubuntu.com (arm64 mirror) has transient outages that red the
          # ARM leg on an UPSTREAM issue, not a code defect. Retry up to 5x with
          # backoff + --fix-missing before failing; the byte-identity assertion
          # itself is unchanged.
          ok=0
          for attempt in 1 2 3 4 5; do
            sudo apt-get update || true
            if sudo apt-get install -y --fix-missing mlir-20-tools clang-20; then ok=1; break; fi
            echo "apt attempt $attempt failed (mirror outage?); retry in $((attempt * 20))s"
            sleep $((attempt * 20))
          done
          [ "$ok" = 1 ] || { echo "MLIR toolchain unavailable after 5 attempts (upstream apt mirror outage)"; exit 1; }
          echo "/usr/lib/llvm-20/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain on PATH
        run: |
          mlir-opt --version | head -1
          mlir-translate --version | head -1
          clang --version | head -1

      - name: Build mindc (MLIR backend)
        run: |
          cargo build --release --no-default-features \
            --features "mlir-build std-surface cross-module-imports" --bin mindc

      - name: Compile the deterministic kernel to a cdylib
        run: |
          ./target/release/mindc build examples/native/ci_kernel.mind \
            --release --emit cdylib --out /tmp/libci_kernel.so
        working-directory: ${{ github.workspace }}

      - name: Run kernel + assert known output (285)
        run: |
          MINDC_SO=/tmp/libci_kernel.so \
            python3 examples/native/ci_kernel_smoke.py
        working-directory: ${{ github.workspace }}

  mindcraft_check:
    name: Mindcraft check (RFC 0007 Phase 6)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Blocking gate: `mindc check` over std/ + examples/ must be error-clean.
    # Cross-module import resolution (see the build step) lets the project-level
    # check see symbols declared in sibling std modules, so the tree now checks
    # with zero error-severity diagnostics — the `continue-on-error` rollout flag
    # is removed. Lint-level warnings remain non-fatal by design (the check exits
    # non-zero only on error-severity diagnostics).

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mindcraft-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-mindcraft-

      - name: Build mindc
        # std-surface enables the while/for/region parser arms used in std/ and
        # examples/. cross-module-imports seeds the whole-project module table so
        # the check resolves symbols declared in sibling modules (e.g. a file that
        # does `import std.sha256`) instead of reporting spurious E2003
        # undefined-call errors — a project-level check would otherwise be
        # stricter than a build. Without either feature the check rejects valid
        # MIND source and exits non-zero.
        run: cargo build --release --no-default-features --features "std-surface cross-module-imports" --bin mindc

      - name: Run mindc check on std/ and examples/
        run: |
          cargo run --release --no-default-features --features "std-surface cross-module-imports" --bin mindc -- \
            check std/ examples/

