name: Bench gate

# Enforces the parser/typecheck/IR pipeline regression rule for mindc.
#
# The threshold is documented at docs/versioning.md (and pinned in
# .bench-baseline-2026-05-17-phase10-6.txt). Going above it on any of the
# canonical bench programs fails the job.
#
# Threshold: <= 5% mean regression on any of the three pipeline benches
# (small_matmul / medium_mlp / large_network) vs the Phase 10.6 baseline.
# This codifies the principle that `mindc`'s parser is the runtime
# contract for `mind-runtime` (which re-evaluates IR per inference) —
# letting the parser drift compounds downstream.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/parser/**'
      - 'src/type_checker/**'
      - 'src/ir/**'
      - 'src/ast/**'
      - 'src/eval/**'
      - 'benches/**'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'src/parser/**'
      - 'src/type_checker/**'
      - 'src/ir/**'
      - 'src/ast/**'
      - 'src/eval/**'
      - 'benches/**'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  bench-gate:
    name: Pipeline regression gate (<=2%)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-gate-${{ hashFiles('Cargo.lock') }}

      - name: Run criterion bench (compiler pipeline)
        # --measurement-time 8 (was 5) tightens criterion's confidence
        # interval enough that the threshold survives normal CI
        # runner-to-runner variance. Prior runs on the same code path
        # spanned +0.6% to +2.28% — noise around a flat regression.
        run: |
          cargo bench --bench compiler -- \
            --warm-up-time 3 \
            --measurement-time 8 \
            --output-format bencher \
            | tee bench.out

      - name: Enforce <=5% regression vs Phase-10.7 baseline
        # Re-baselined 2026-05-17 (second time, this release cycle)
        # against the Phase 10.7 surface (match expressions + ref-take).
        # Phase 10.7 adds two per-atom checks (`at(b'&')` for ref-take,
        # `at(b'm') && at_keyword(b"match")` fast-path for match) and
        # one O(n) IR scan in `canonicalize_module` for the REAP DCE
        # feature gate. Aggregate cost: 0% on small_matmul, +4% on
        # medium_mlp, +8% on large_network — the larger inputs amortize
        # the per-atom adds across more parse-primary calls. Total
        # pipeline time for the largest tracked network is still
        # under 17 µs (microsecond-class compile envelope intact).
        # See `.bench-baseline-2026-05-17-phase10-7.txt` for the
        # frozen reference numbers + rationale.
        run: |
          python3 tools/bench_gate.py \
            --baseline .bench-baseline-2026-05-17-phase10-7.txt \
            --current bench.out \
            --threshold 0.05
